<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA fallback:
      // - project page: /mero-website/*  -> segmentCount = 1
      // - custom domain root: /*         -> segmentCount = 0
      const { l } = { l: window.location };
      const repoBaseSegment = "mero-website";
      const hasRepoBase =
        l.pathname === `/${repoBaseSegment}` ||
        l.pathname.startsWith(`/${repoBaseSegment}/`);
      const segmentCount = hasRepoBase ? 1 : 0;
      const path = l.pathname
        .split("/")
        .slice(1 + segmentCount)
        .join("/")
        .replace(/&/g, "~and~");
      const search = l.search ? `&${l.search.slice(1).replace(/&/g, "~and~")}` : "";

      l.replace(
        `${l.protocol}//${l.hostname}${l.port ? `:${l.port}` : ""}${l.pathname
          .split("/")
          .slice(0, 1 + segmentCount)
          .join("/")}/?/${path}${search}${l.hash}`
      );
    </script>
  </head>
  <body></body>
</html>
